name: Test

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Unit Tests
        run: go test ./... -v -count=1

      - name: E2E CLI Tests
        run: go test -tags=e2e -v -count=1 ./cmd/gig/
